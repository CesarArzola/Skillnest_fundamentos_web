<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formularios HTML</title>
</head>
<body>
    <header>
        <h1>Formularios HTML - Ejemplos</h1>
        <hr>
    </header>
    <main>
        <h2>Formulario de registro</h2>
        <p>Completa los siguientes datos:</p>
        <form><!-- Etiqueta para crear un formulario -->
            <label>Nombre:</label> <!-- Etiqueta que describe al campo -->
            <input type="text" name="Nombre" placeholder="Ejemplo: César Pro"> <!-- Campo de texto -->
            <br><br>
            <label>Correo electronico:</label>
            <input type="email" name="Correo" placeholder="cesarpro@liceovvh.cl">
            <br><br>
            <label>Contraseña:</label>
            <input type="password" name="Password"> <!-- Formato contraseña -->
            <br><br>
            <label>Edad:</label>
            <input type="number" name="Edad"> <!-- Admite solo números -->
            <br><br>
            <label>Fecha de nacimiento:</label>
            <input type="date" name="FechaNac"> <!-- Formato fecha -->
            <br><br>
            <label>Géneros</label> <br>
            <input type="radio" name="Genero" value="Masculino"> <!-- Elemento de seleccion única -->
            Masculino
            <input type="radio" name="Genero" value="Femenino">
            Femenino
            <br><br>
            <label>Intereses:</label> <br>
            <input type="checkbox" name="Intereses" value="Musica"> <!-- Elementos de seleccion multiple -->
            Musica<br>
            <input type="checkbox" name="Intereses" value="Deportes">
            Deportes<br>
            <input type="checkbox" name="Intereses" value="Películas">
            Películas
            <br><br>
            <label>Ciudad:</label> <br>
            <select name="Ciudad"> <!-- Lista desplegable de opciones -->
                <option>Santiago</option>
                <option>Valparaíso</option>
                <option>Coquimbo</option>
                <option>Arica</option>
            </select>
            <br><br>
            <label>Comentarios</label> <br>
            <textarea name="Comentarios" rows="4" cols="30"></textarea> <!-- Elemento de texto largo con filas y columnas -->
            <br><br>
            <input type="file" name="Archivo"> <!-- Seleccionar un archivo local -->
            <br><br>
            <label>Color favorito:</label> <br>
            <input type="color" name="Color"> <!-- Seleccionar un color -->
            <br><br>
            <label>Nivel de satisfacción:</label> <br>
            <input type="range" name="satisfaccion" win="1" max="7">
            <br><br>
            <input type="submit" value="Enviar"> <!-- Botón para enviar formulario -->
            <input type="reset" value="Limpiar"> <!-- Botón para limpiar formulario -->
            <br><br>
        </form>
        <!-- Creacion de tabla con datos -->
        <h2>Tabla de usuarios</h2>
        <table border="1">
            <tr> <!-- Fila de tabla (table row) -->
                <th>Nombre</th> <!-- Encabezado de tabla (table head) -->
                <th>Correo</th>
                <th>Edad</th>
            </tr>
            <tr>
                <td>Catalina</td> <!-- Datos de la tabla (table data) -->
                <td>catalina@liceovvh.cl</td>
                <td>16</td>
            </tr>
            <tr>
                <td>Fernando</td>
                <td>fernando@gmail.com</td>
                <td>17</td>
            </tr>
        </table>
    </main>

</body>

</html>
