<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="César Arzola">
    <title>Pagina de perfil</title>
    <!-- Link Css -->
    <link rel="stylesheet" href="static/css/style.css">
</head>

<body>
    <header class="header">
        <h1>Perfil</h1>
        <nav class="nav">
            <a href="#" class="link_nav">Inicio</a>
            <a href="#" class="link_nav">Mi perfil</a>
            <a href="#" class="link_nav">Conexiones</a>
            <button class="boton">Cerrar sesión</button>
        </nav>
    </header>
    <main class="cont_principal">
        <div class="cont_izquierda">
            <div class="azul">
                <img class="usuario" src="static/images/user2.jfif" alt="user">
            </div>
            <div class="blanco">
                <h1>Jane Doe</h1>
                <a href="#" class="link_izq_sup">Bergen, Noruega</a>
                <div class="parrafo">
                    <p>Desarrolladora Fronted</p>
                    <p>Conocimientos en HTML, CSS y JavaScript</p>
                </div>
                <a href="#" class="link_izq_inf">⚙️ Editar perfil</a>
            </div>
        </div>
        <div class="cont_derecha">
            <div class="superior">
                <div class="solicitudes">
                    <h2>Solicitudes de conexión</h2>
                    <button>Ver todas</button>
                </div>
                <div class="usuarios">
                    <div class="opciones">
                        <div>
                            <img src="static/images/user2.jfif" alt="user">Steve Jobs
                        </div>
                        <div class="opcion1">
                            <div class="opcion2">✔️</div>
                            <div class="opcion3">❌</div>
                        </div>
                    </div>
                    <div class="opciones">
                        <div>
                            <img src="static/images/user2.jfif" alt="user">Bill Gates
                        </div>
                        <div class="opcion1">
                            <div class="opcion2">✔️</div>
                            <div class="opcion3">❌</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="inferior">
                <div class="conexiones">
                    <h2>Tus conexiones</h2>
                    <button>Ver todas</button>
                </div>
                <div class="usuarios">
                    <div>
                        <img src="static/images/user2.jfif" alt="user">Richard Stallman
                    </div>
                    <div>
                        <img src="static/images/user2.jfif" alt="user">Linus Torvalds
                    </div>
                    <div>
                        <img src="static/images/user2.jfif" alt="user">Ada Lovelace
                    </div>
                    <div>
                        <img src="static/images/user2.jfif" alt="user">Grace Hopper
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
