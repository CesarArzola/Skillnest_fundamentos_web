<!-- Tarea formulario: Crear un formulario de registro
para un sitio web para reservar una hora al doctor.
Debe incluir: Nombre del paciente, Fecha de cita,
Fecha_nacimiento, Sintomas del paciente, Ciudad (lista desplegable
y Casilla de verificación) -->

<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario - Paciente</title>
</head>

<body>
    <div>
        <label for="Nombre del Paciente">Nombre del Paciente:</label>
        <input type="text" id="Nombre del Paciente" name="Nombre del Paciente">
    </div>
    <div>
        <label for="Fecha de Cita">Fecha de Cita:</label>
        <input type="date" id="Fecha de Cita" name="Fecha de Cita">
    </div>
    <div>
        <label for="Fecha_nacimiento">Fecha de Nacimiento:</label>
        <input type="date" id="Fecha de Nacimiento" name="Fecha de Nacimiento">
    </div>
    <div>
        <label for="Sintomas del Paciente">Sintomas del Paciente:</label>
        <textarea id="Sintomas del Paciente" name="Sintomas del Paciente" rows="1" cols="30"></textarea>
    </div>
    <div>
        <label for="Ciudad">Ciudad:</label>
        <select id="Ciudad" name="Ciudad">
            <option value="santiago_de_chile">Santiago de Chile</option>
            <option value="iquique">Iquique</option>
            <option value="antofagasta">Antofagasta</option>
            <option value="valparaiso">Valparaíso</option>
            <option value="concepcion">Concepción</option>
        </select>
    </div>
    <div>
        <input type="checkbox" id="¿Datos correctos?" name="¿Datos correctos?">
        <label for="¿Datos correctos?">¿Datos correctos?</label> 
    </div>
</body>

</html>
